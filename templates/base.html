<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebShield Analyzer | Enterprise Security</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #ffffff; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); border-bottom: 1px solid #f3f4f6; }
    </style>
</head>
<body class="bg-white min-h-screen font-sans text-zinc-800 flex flex-col selection:bg-zinc-900 selection:text-white">
    
    <nav class="glass-nav sticky top-0 z-50 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-6 md:px-12 h-20 flex justify-between items-center">
            <a href="/" class="text-xl font-black tracking-tighter text-zinc-900 flex items-center gap-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                WebShield<span class="text-zinc-400 font-normal">Analyzer</span>
            </a>
            <div class="hidden md:flex space-x-8 items-center text-sm font-medium">
                <a href="/" class="text-zinc-500 hover:text-zinc-900 transition-colors">Beranda</a>
                <a href="/scanner" class="text-zinc-500 hover:text-zinc-900 transition-colors">Scanner</a>
                <a href="/about" class="text-zinc-500 hover:text-zinc-900 transition-colors">Dokumentasi</a>
                <a href="/scanner" class="bg-zinc-900 text-white px-5 py-2.5 rounded hover:bg-zinc-800 transition-colors">Mulai Scan</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-zinc-50 border-t border-zinc-200 mt-16 py-12">
        <div class="max-w-7xl mx-auto px-6 md:px-12 flex flex-col md:flex-row justify-between items-center text-xs text-zinc-500 font-medium tracking-widest uppercase">
            <span>&copy; 2026 WebShield Systems.</span>
            <span class="mt-4 md:mt-0">Enterprise Grade OSINT & Security Engine</span>
        </div>
    </footer>
</body>
</html>
